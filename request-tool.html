<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suggest an AI Tool</title>
    
    <!-- Fixed Inline SVG Emoji Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://w3.org' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">

    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container-box {
            max-width: 500px;
            width: 100%;
            padding: 30px;
            background: #1a1a1a;
            border: 1px solid #C8A24D;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            box-sizing: border-box;
        }
        .container-box h3, .container-box h2 { margin-top: 0; color: #C8A24D; }
        
        /* Form Specific Styles */
        .tool-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }
        .tool-form input, .tool-form textarea {
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }
        .tool-form textarea { height: 120px; resize: vertical; }
        
        .submit-btn, .home-btn {
            background: #C8A24D;
            color: #000;
            padding: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            margin-top: 10px;
            text-align: center;
            text-decoration: none;
            display: block;
        }
        .submit-btn:hover, .home-btn:hover { background: #b08d3d; }
        
        /* Back to Home Link Styling */
        .back-home {
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            align-self: flex-start;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s ease;
            margin-bottom: 5px;
        }
        .back-home:hover { color: #C8A24D; }

        /* Hidden States */
        .hidden { display: none !important; }
        .success-view { text-align: center; }
        .success-view p { color: #ccc; line-height: 1.6; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container-box">
        <!-- Back to Home Button -->
        <a href="/" class="back-home">← Back to Home</a>

        <!-- VIEW 1: THE INPUT FORM -->
        <div id="formView">
            <h3>Suggest an AI Tool</h3>
            <p style="color: #ccc; margin-bottom: 15px;">Help us grow our library. Tell us which tool you want to see next.</p>
            
            <form name="tool-requests" method="POST" action="/request-tool?status=success" data-netlify="true" class="tool-form">
                <input type="text" name="tool-name" placeholder="Name of the AI Tool" required>
                <input type="email" name="email" placeholder="Your Email (optional)">
                <textarea name="message" placeholder="Why is this tool great?" required></textarea>
                <button type="submit" class="submit-btn">Submit Suggestion</button>
            </form>
        </div>

        <!-- VIEW 2: THE THANK YOU MESSAGE (Hidden by default) -->
        <div id="successView" class="success-view hidden">
            <h2>Suggestion Received! 🚀</h2>
            <p>Thank you, Fahad! Your suggestion has been successfully submitted. We will review the AI tool and add it to our directory soon.</p>
            <a href="/" class="home-btn">Go Back Home</a>
        </div>
    </div>

    <!-- Script to toggle views instantly without changing files -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('status') === 'success') {
            document.getElementById('formView').classList.add('hidden');
            document.getElementById('successView').classList.remove('hidden');
        }
    </script>

</body>
</html>
